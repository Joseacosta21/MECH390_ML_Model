random_seed: 42

material:
  rho: {min: 7800, max: 7800}
  yield_stress: {min: 100e6, max: 100e6}
  yield_shear_stress: {min: 100e6, max: 100e6}
  # 2024-T3 Aluminium mechanical properties for stress / fatigue / buckling analysis
  # Mother Doc v7 Section 10.1 — all values in SI units (Pa, dimensionless)
  E: 73.1e9             # Elastic modulus (Pa)
  S_ut: 483e6           # Ultimate tensile strength (Pa)
  S_y: 345e6            # Yield strength, 0.2% offset (Pa)
  S_prime_e: 130e6      # Reference fatigue strength at 10^8 cycles (Pa)
  sigma_f_prime: 807e6  # Fatigue strength coefficient ≈ 1.67 * S_ut (Pa)
  G: 28e9               # Shear modulus (Pa)
  nu: 0.33              # Poisson's ratio

geometry:
  r: {min: 0.04, max: 0.15}        # crank radius (m)
  l: {min: 0.1, max: 0.38}         # rod length (m)
  e: {min: 0.00, max: 0.35}        # offset (m)
  slider:
    length: 0.02                     # slider length (m)
    width: 0.02                    # slider width (m)
    height: 0.02                     # slider height (m)
  widths:
    width_r: {min: 0.005, max: 0.02}
    width_l: {min: 0.005, max: 0.02}
  thicknesses:
    thickness_r: {min: 0.005, max: 0.02}
    thickness_l: {min: 0.005, max: 0.02}
  pin_diameters:
    pin_diameter_A: {min: 0.002, max: 0.005}
    pin_diameter_B: {min: 0.002, max: 0.005}
    pin_diameter_C: {min: 0.002, max: 0.005}


operating:
  RPM: 30
  P: 0.5                          # process load placeholder (currently unused)
  mu: 0.2                         # coefficient of friction
  g: 9.81                         # gravitational acceleration (m/s²)
  ROM: 0.25                       # range of motion (m)
  ROM_tolerance: 0.0005           # ±0.5 mm
  QRR: {min: 1.5, max: 2.5}       # quick return ratio
  TotalCycles: 18720000           # 5 years of operation at 30 RPM

sampling:
  method: latin_hypercube          # latin_hypercube | random | grid
  n_samples: 40              # ignored for grid
  n_variants_per_2d: 5
  constraints:
    - "r > 0"
    - "l > 0"
    - "e >= 0"

manufacturing:
  resolution_mm: 1.0              # r, l, e, widths, thicknesses rounded to nearest mm
  pin_resolution_mm: 0.1          # pin diameters rounded to nearest 0.1 mm

sweep:
  theta_step_deg: 15               # fixed sweep step

limits:
  sigma_allow: 180e6               # Pa
  tau_allow: 100e6                 # Pa
  safety_factor: 1.0

output:
  csv_all: "all_cases.csv"
  csv_pass: "train_pass.csv"
  store_theta_at_max: true
