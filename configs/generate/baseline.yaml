random_seed: 42

material:
  # Material: Al 2024-T3 — all values in SI units (Pa, dimensionless)
  rho: {min: 2780, max: 2780}  # density (kg/m³)
  E: 73.1e9             # Elastic modulus (Pa)
  S_ut: 483e6           # Ultimate tensile strength (Pa)
  S_y: 345e6            # Yield strength, 0.2% offset (Pa); also used as static stress limit
  # Fatigue strength at design life (18,720,000 cycles), fully reversed (R=-1).
  # Source: ASM data for Al 2024-T3 at 5×10^8 cycles → 138 MPa; interpolated to
  # 18.72×10^6 cycles using Basquin S-N curve → 133 MPa. Conservative choice.
  Sn: 133e6             # Fatigue strength at design life (18,720,000 cycles) (Pa)
  G: 28e9               # Shear modulus (Pa)
  nu: 0.33              # Poisson's ratio

geometry:
  r: {min: 0.04, max: 0.15}        # crank radius (m)
  l: {min: 0.1, max: 0.38}         # rod length (m)
  e: {min: 0.00, max: 0.35}        # offset (m)
  slider:
    length: 0.02                     # slider length (m)
    width: 0.02                    # slider width (m)
    height: 0.02                     # slider height (m)
  widths:
    width_r: {min: 0.001, max: 0.009}    # 1–9 mm  (tuned for ~50% pass rate with crank fatigue boundary)
    width_l: {min: 0.001, max: 0.009}
  thicknesses:
    thickness_r: {min: 0.001, max: 0.009}
    thickness_l: {min: 0.001, max: 0.009}
  pin_diameters:
    pin_diameter_A: {min: 0.001, max: 0.004}  # 1–4 mm  (was 2–5 mm)
    pin_diameter_B: {min: 0.001, max: 0.004}
    pin_diameter_C: {min: 0.001, max: 0.004}


operating:
  RPM: 30
  P: 0.5                          # slider block mass (kg) — injected into dynamics as m_block
  mu: 0.47                        # coefficient of friction — dry machined Al–Al (Shigley's Table 8-2)
  g: 9.81                         # gravitational acceleration (m/s²)
  ROM: 0.25                       # range of motion (m)
  ROM_tolerance: 0.0005           # ±0.5 mm
  QRR: {min: 1.5, max: 2.5}       # quick return ratio
  TotalCycles: 18720000           # 5 years of operation at 30 RPM

sampling:
  method: latin_hypercube          # latin_hypercube | random | grid
  n_samples: 40              # ignored for grid
  n_variants_per_2d: 5
  constraints:
    - "r > 0"
    - "l > 0"
    - "e >= 0"

stress_analysis:
  # Diametral clearance: D_hole = D_pin + delta (m)
  # 0.1 mm is a typical close-running fit for small pins.
  delta: 1e-4                      # diametral clearance (m)

  # Minimum wall thickness on each side of a pin hole (m).
  # Net-section constraint: width > D_pin + delta + 2 * min_wall
  # At 0.5 mm per side, a 2 mm pin in a 4 mm link leaves 1.0 mm net section.
  min_wall_mm: 0.5e-3              # 0.5 mm (m)

  # Stress concentration factors (dimensionless)
  # Kt_lug:          single-shear round-ended lug (Mother Doc Section 8.1)
  # Kt_hole_torsion: peak torsional shear at pin hole (Peterson 4.9.1, conservative)
  Kt_lug: 2.34
  Kt_hole_torsion: 4.0

  # Buckling target safety factor for machinery (Mother Doc Section 14.5)
  n_buck_target: 3.0

  # Basquin S-N constants — AA2024-T3 experimental, fully reversed (R=-1)
  # Anchors: (10^7 cycles, 230 MPa) and (10^9 cycles, 155 MPa)
  # b = log10(155/230) / log10(1e9/1e7) = -0.086
  # A = 230 / (1e7)^(-0.086) = 924 MPa
  # Valid range: 10^5 to 10^9 cycles
  basquin_A: 924e6              # Basquin intercept A (Pa)
  basquin_b: -0.086             # Basquin slope b (dimensionless)

  # Fatigue strength correction factors (Mott Ch. 5):
  # S'n = Sn * C_sur * C_s * C_st * C_R * C_m * C_f
  # C_sur: manufacturing / surface condition factor (Mott Table 5-4)
  #        as-machined, Al 2024-T3, S_ut=483 MPa → 4.51*483^(-0.265) ≈ 0.88
  # C_s:   size factor — computed from equivalent diameter in fatigue.py (Mott Table 5-3)
  C_sur: 0.88           # manufacturing method factor: as-machined (Mott Table 5-4)
  C_st: 1.0             # stress type / load factor
  C_R: 0.81             # reliability factor (≈ 99%, Mott Table 5-3)
  C_f: 1.0              # miscellaneous / environment factor
  C_m: 1.0              # material factor (wrought Al, no special treatment)

manufacturing:
  resolution_mm: 1.0              # r, l, e, widths, thicknesses rounded to nearest mm
  pin_resolution_mm: 0.1          # pin diameters rounded to nearest 0.1 mm

limits:
  safety_factor: 1.0               # de-rating divisor applied to material yield limits. This applies to static.
  utilization_max: 1.0             # utilization = max(sigma_max/sigma_limit, tau_max/tau_limit)
  n_static_min: 1.0                # shared minimum static FoS (used as fallback for per-component values)
  n_static_rod_min: 1.0            # minimum static FoS — rod
  n_static_crank_min: 1.0          # minimum static FoS — crank
  n_static_pin_min: 1.0            # minimum static FoS — pin
  n_fatigue_min: 1.0               # shared minimum fatigue FoS (used as fallback for per-component values)
  n_fatigue_rod_min: 1.0           # minimum fatigue governing FoS (rod)
  n_fatigue_crank_min: 1.0         # minimum fatigue governing FoS (crank)
  n_fatigue_pin_min: 1.0           # minimum fatigue governing FoS (pin)
  n_buck_min: 3.0                  # minimum Euler buckling FoS
  D_miner_max: 1.0                 # shared Miner damage limit (used as fallback for per-component values)
  D_miner_rod_max: 1.0             # Miner damage limit — rod
  D_miner_crank_max: 1.0           # Miner damage limit — crank
  D_miner_pin_max: 1.0             # Miner damage limit — pin
