objectives:
  min_n_fatigue:
    weight:    0.30
    direction: maximize       # min fatigue FoS across rod, crank, pin

  volume_envelope:
    weight:    0.30
    direction: minimize       # smaller footprint → easier to fit/mount

  tau_A_max:
    weight:    0.20
    direction: minimize       # lower peak torque → smaller / cheaper motor

  E_rev:
    weight:    0.10
    direction: minimize       # lower energy per revolution → more efficient motor selection

  total_mass:
    weight:    0.10
    direction: minimize       # lighter mechanism → cheaper to 3D print

constraints:
  pass_fail_prob_min: 0.95    # reject geometries with predicted pass probability < 95%

  # penalty scales — multiply raw violation before subtracting from score
  penalty_net_section_scale: 1000.0   # net section (metres)
  penalty_kinematic_scale:   100.0    # kinematic feasibility (metres)
  penalty_buckling_scale:    1.0      # buckling FoS deficit (dimensionless)

  # penalise predictions outside training range to avoid OOD exploitation
  # ood_tolerance: grace band (fraction of training range) before penalty kicks in
  # ood_penalty_scale: multiplier per unit of excess, scaled by objective weight
  ood_tolerance:     0.1
  ood_penalty_scale: 10.0

  # keep stroke at 250 mm +- 0.5 mm — surrogate only learned structure, not kinematics
  penalty_rom_scale:  200.0

  # keep QRR in [1.5, 2.5] — same reason as ROM
  penalty_qrr_scale:  20.0

optimizer:
  method:         differential_evolution
  n_top_results:  3           # number of top-ranked geometries to report
  seed:           42
  maxiter:        1500         # max iterations for differential_evolution
  popsize:        15          # population size multiplier (total pop = popsize × n_vars)
